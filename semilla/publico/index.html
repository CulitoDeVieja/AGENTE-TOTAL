<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AGENTE-TOTAL · Tablero</title>
    <link rel="stylesheet" href="/estilo.css" />
  </head>
  <body>
    <header class="barra-superior">
      <div class="titulo">🌱 AGENTE-TOTAL</div>
      <div class="leyenda">panel informativo · los agentes deciden</div>
      <div class="estado-conexion" id="estado-conexion">conectando…</div>
    </header>

    <main>
      <section class="columna feed">
        <h2>Feed en vivo</h2>
        <ul id="feed"></ul>
      </section>

      <section class="columna kanban">
        <h2>Tablero</h2>
        <div class="tablero" id="tablero">
          <div class="pila" data-estado="pendiente">
            <h3>Pendientes</h3>
            <ul></ul>
          </div>
          <div class="pila" data-estado="en-curso">
            <h3>En curso</h3>
            <ul></ul>
          </div>
          <div class="pila" data-estado="hecha">
            <h3>Hechas</h3>
            <ul></ul>
          </div>
          <div class="pila" data-estado="fallada">
            <h3>Falladas</h3>
            <ul></ul>
          </div>
        </div>
      </section>
    </main>

    <form class="barra-orden" id="form-orden">
      <input
        id="input-orden"
        name="titulo"
        placeholder="Decile qué querés al sistema…"
        autocomplete="off"
        maxlength="300"
      />
      <button type="submit" class="enviar">Enviar orden</button>
    </form>

    <script src="/app.js"></script>
  </body>
</html>
